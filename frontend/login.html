<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Đăng nhập Admin - ThanhTruc</title>
    <style>
        .login-box { max-width: 400px; margin: 100px auto; padding: 40px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid #008080; }
        .login-box h2 { text-align: center; color: #008080; margin-bottom: 30px; }
        .login-form input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .login-btn { width: 100%; padding: 12px; background: #008080; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .login-btn:hover { background: #006666; }
        .error-msg { color: #e74c3c; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body style="background: #f4f7f6;">
    <div class="login-box">
        <h2><i class="fas fa-lock"></i> Đăng nhập Admin</h2>
        <form class="login-form" id="login-form">
            <input type="text" id="username" placeholder="Tên đăng nhập" required>
            <input type="password" id="password" placeholder="Mật khẩu" required>
            <button type="submit" class="login-btn">Đăng nhập</button>
            <p id="error-msg" class="error-msg">Sai tài khoản hoặc mật khẩu!</p>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('adminToken', data.token); // Lưu token vào trình duyệt
                    window.location.href = 'admin.html'; // Chuyển sang trang quản trị
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                alert('Lỗi kết nối tới Server!');
            }
        });
    </script>
</body>
</html>
